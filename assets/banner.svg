<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 330" width="1200" height="330" role="img" aria-label="Muhammad Abdullah — Data Scientist">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1120"/>
      <stop offset="52%" stop-color="#0f3d3a"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <radialGradient id="glowA" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.50"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="330" rx="26" fill="url(#bg)"/>
  <circle cx="1010" cy="20" r="280" fill="url(#glowA)"/>
  <circle cx="160" cy="350" r="260" fill="url(#glowB)"/>

  <!-- dotted accent grid (top-left) -->
  <g fill="#2dd4bf" opacity="0.30">
    <circle cx="70" cy="58" r="3"/>  <circle cx="100" cy="58" r="3"/>  <circle cx="130" cy="58" r="3"/>  <circle cx="160" cy="58" r="3"/>
    <circle cx="70" cy="86" r="3"/>  <circle cx="100" cy="86" r="3"/>  <circle cx="130" cy="86" r="3"/>  <circle cx="160" cy="86" r="3"/>
    <circle cx="70" cy="114" r="3"/> <circle cx="100" cy="114" r="3"/> <circle cx="130" cy="114" r="3"/> <circle cx="160" cy="114" r="3"/>
  </g>
  <!-- dotted accent grid (bottom-right) -->
  <g fill="#6366f1" opacity="0.35">
    <circle cx="1040" cy="216" r="3"/> <circle cx="1070" cy="216" r="3"/> <circle cx="1100" cy="216" r="3"/> <circle cx="1130" cy="216" r="3"/>
    <circle cx="1040" cy="244" r="3"/> <circle cx="1070" cy="244" r="3"/> <circle cx="1100" cy="244" r="3"/> <circle cx="1130" cy="244" r="3"/>
    <circle cx="1040" cy="272" r="3"/> <circle cx="1070" cy="272" r="3"/> <circle cx="1100" cy="272" r="3"/> <circle cx="1130" cy="272" r="3"/>
  </g>

  <text x="600" y="150" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="72" font-weight="700" fill="#ffffff" letter-spacing="1">Muhammad Abdullah</text>
  <text x="600" y="200" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="21" font-weight="600" fill="#5eead4" letter-spacing="6">DATA SCIENTIST &#8226; MACHINE LEARNING &#8226; ANALYTICS</text>
  <rect x="525" y="224" width="150" height="3" rx="1.5" fill="url(#rule)"/>
  <text x="600" y="272" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="17" fill="#94a3b8" letter-spacing="1">turning messy data into production systems &#8226; Lahore, Pakistan</text>
</svg>
